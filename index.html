<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMA5 Operations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root { --bg: #FAF7F2; --bg2: #FFFFFF; --bg3: #F0EDE8; --border: #E5DFD6; --text: #2D2418; --muted: #8C7B6E; --accent: #2563EB; --green: #16A34A; --yellow: #CA8A04; --red: #DC2626; --purple: #7C3AED; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; background: var(--bg); }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; font-size: 14px; }

    .topbar { position: sticky; top: 0; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-left { display: flex; align-items: center; }
    .site-name { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    .site-name span { color: var(--muted); font-weight: 300; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .sync-time { font-size: 12px; color: var(--muted); }
    .tabs { display: flex; gap: 4px; }
    .tab { padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--muted); border: 1px solid transparent; transition: all 0.15s; }
    .tab:hover { color: var(--accent); }
    .tab.active { background: var(--bg2); color: var(--accent); border-color: var(--border); }

    .content { max-width: 900px; margin: 0 auto; padding: 32px 24px 80px; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
    .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 4px; }
    .stat-value { font-size: 26px; font-weight: 700; color: var(--text); }
    .stat-value.accent { color: var(--accent); }
    .stat-value.red { color: var(--red); }

    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
    .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .chart-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 12px; }
    .chart-wrap { height: 180px; position: relative; }

    .month-group { margin-bottom: 40px; }
    .month-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
    .month-count { font-weight: 400; letter-spacing: 0; text-transform: none; }

    .day-entry { padding: 20px 0; border-bottom: 1px solid rgba(229,223,214,0.5); }
    .day-entry:last-child { border-bottom: none; }
    .day-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 12px; }
    .day-date-block { flex-shrink: 0; width: 52px; text-align: center; }
    .day-date-num { font-size: 30px; font-weight: 300; line-height: 1; color: var(--accent); letter-spacing: -1px; opacity: 0.6; }
    .day-date-weekday { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-top: 2px; }

    .props { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; align-items: flex-start; padding-top: 4px; }
    .prop { display: flex; align-items: center; gap: 5px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 12px; }
    .prop-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .prop-value { font-weight: 500; }
    .prop.green .prop-value { color: var(--green); }
    .prop.red .prop-value { color: var(--red); }

    .section { margin-bottom: 10px; }
    .section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .section-label .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .section-content { font-size: 13px; color: var(--text); padding-left: 11px; }
    .activity-item::after { content: ' ·'; color: var(--muted); }
    .activity-item:last-child::after { content: ''; }
    .entry-footer { font-size: 11px; color: var(--muted); padding-left: 11px; margin-top: 6px; }

    .filter-row { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
    .filter-label { font-size: 12px; color: var(--muted); margin-right: 4px; }
    .pill { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); cursor: pointer; font-size: 12px; color: var(--muted); transition: all 0.15s; user-select: none; }
    .pill:hover { border-color: var(--accent); color: var(--accent); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }

    .team-dept { margin-bottom: 28px; }
    .dept-header { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 4px; display: flex; justify-content: space-between; }
    .dept-count { font-weight: 400; letter-spacing: 0; text-transform: none; }
    .person-row { display: flex; align-items: center; gap: 16px; padding: 9px 0; border-bottom: 1px solid rgba(229,223,214,0.4); font-size: 13px; }
    .person-row:last-child { border-bottom: none; }
    .person-name { font-weight: 500; min-width: 170px; }
    .person-qual { color: var(--muted); min-width: 150px; font-size: 12px; }
    .person-company { color: var(--muted); flex: 1; font-size: 12px; }

    .view { display: none; }
    .view.active { display: block; }
    .loading { padding: 60px 0; text-align: center; color: var(--muted); }
    .error-msg { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 8px; padding: 12px 16px; color: var(--red); font-size: 13px; }

    @media (max-width: 640px) {
      .content { padding: 20px 16px 60px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .charts-grid { grid-template-columns: 1fr; }
      .topbar { padding: 0 16px; }
      .day-date-num { font-size: 24px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="site-name">EMA5 <span>/ <span id="viewTitle">Daily Journal</span></span></div>
  </div>
  <div class="topbar-right">
    <span class="sync-time" id="syncTime">—</span>
    <div class="tabs">
      <div class="tab active" id="tab-journal" onclick="showView('journal')">Journal</div>
      <div class="tab" id="tab-team" onclick="showView('team')">Team</div>
      <div class="tab" id="tab-progress" onclick="showView('progress')">Progress</div>
    </div>
  </div>
</div>

<div class="content">
  <div class="view active" id="view-journal">
    <div class="stats-row" id="statsRow"></div>
    <div class="charts-grid">
      <div class="chart-card"><div class="chart-title">Headcount — Last 14 Days</div><div class="chart-wrap"><canvas id="chartHC"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">Delays by Cause (30d)</div><div class="chart-wrap"><canvas id="chartDelay"></canvas></div></div>
    </div>
    <div class="filter-row" id="monthFilter"></div>
    <div id="journalEntries"></div>
  </div>
  <div class="view" id="view-team"><div id="teamContent"></div></div>
  <div class="view" id="view-progress"><div id="progressContent"></div></div>
</div>

<script>
const DATA = { dailyLog: [], workDays: [], siteProgress: [], team: [], loaded: false };
let charts = {};

// GitHub raw URLs — no CORS issues
const GH_BASE = 'https://raw.githubusercontent.com/AS76/ema5-data/main';

async function fetchJSON(path) {
  // Strip cache-busting query params for GitHub raw URLs (doesn't support them)
  const cleanPath = path.replace(/\?cb=\d+/, '');
  try {
    const r = await fetch(cleanPath);
    if (!r.ok) throw new Error(r.status + ' ' + r.statusText + ' [url: ' + cleanPath.slice(0,80) + ']');
    return r.json();
  } catch(e) {
    console.error('fetchJSON error:', e);
    throw e;
  }
}

async function loadAll() {
  try {
    const [dl, wd, sp, tm] = await Promise.all([
      fetchJSON(GH_BASE + '/daily_log.json?' + 'cb=' + Date.now()),
      fetchJSON(GH_BASE + '/work_days.json?' + 'cb=' + Date.now()),
      fetchJSON(GH_BASE + '/site_progress.json?' + 'cb=' + Date.now()),
      fetchJSON(GH_BASE + '/work_days.json?' + 'cb=' + Date.now()) // team from work_days
    ]);
    DATA.dailyLog = dl;
    DATA.workDays = wd;
    DATA.siteProgress = sp;
    DATA.team = wd;
    DATA.loaded = true;
    document.getElementById('syncTime').textContent = 'Synced ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
    renderAll();
  } catch(e) {
    document.getElementById('journalEntries').innerHTML = `<div class="error-msg">Error loading: ${e.message}</div>`;
  }
}

function parseDateDMY(s) {
  if (!s || typeof s !== 'string') return null;
  const parts = s.trim().split(/[\/\-]/);
  if (parts.length !== 3) return null;
  // Try DD/MM/YY or DD-MM-YY
  let dd, mm, yy;
  if (parts[0].length === 2 && parts[1].length === 2 && parts[2].length === 2) {
    dd = parseInt(parts[0]); mm = parseInt(parts[1]); yy = parseInt(parts[2]);
    yy = yy < 50 ? 2000 + yy : 1900 + yy;
  } else if (parts[0].length === 2 && parts[1].length === 2 && parts[2].length === 4) {
    dd = parseInt(parts[0]); mm = parseInt(parts[1]); yy = parseInt(parts[2]);
  } else {
    return null;
  }
  return new Date(yy, mm - 1, dd);
}

function computeShiftsByDate(rows) {
  const map = {};
  rows.forEach(r => {
    const d = parseDateDMY(r.Date || r.date);
    if (!d) return;
    const k = d.toISOString().slice(0, 10);
    if (!map[k]) map[k] = { total: 0, morning: 0, afternoon: 0, night: 0 };
    map[k].total++;
    const t = (r['Start Time'] || r.start_time || '00:00').toString();
    if (t < '12:00') map[k].morning++;
    else if (t < '17:00') map[k].afternoon++;
    else map[k].night++;
  });
  return map;
}

function delayHours(text) {
  if (!text) return 0;
  let h = 0;
  const m = String(text).match(/(\d+(?:\.\d+)?)\s*h(?!ou)/gi);
  if (m) h += m.reduce((s, x) => s + parseFloat(x), 0);
  return Math.round(h * 10) / 10;
}

function delayCause(text) {
  if (!text) return '';
  return String(text).trim().split('.')[0].trim();
}

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderStats() {
  const shifts = computeShiftsByDate(DATA.workDays);
  const dates = Object.keys(shifts).sort();
  const last14 = dates.slice(-14);
  const today = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  const todayHC = shifts[today] || shifts[yesterday] || { total: 0, morning: 0, afternoon: 0, night: 0 };
  const totalDays = dates.length;
  const totalEntries = DATA.dailyLog.length;
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
  let totalDelayH = 0;
  DATA.dailyLog.forEach(r => {
    const d = parseDateDMY(r.Date || r.date);
    if (d && d >= cutoff) totalDelayH += delayHours(r.Delays || r.delays);
  });
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-label">Headcount Today</div><div class="stat-value accent">${todayHC.total}</div><div class="stat-label" style="margin-top:4px">M ${todayHC.morning} · A ${todayHC.afternoon} · N ${todayHC.night}</div></div>
    <div class="stat-card"><div class="stat-label">Work Days on Site</div><div class="stat-value">${totalDays}</div></div>
    <div class="stat-card"><div class="stat-label">Journal Entries</div><div class="stat-value">${totalEntries}</div></div>
    <div class="stat-card"><div class="stat-label">Downtime (30d)</div><div class="stat-value red">${totalDelayH}h</div></div>
  `;
}

function renderCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  charts = {};
  const shifts = computeShiftsByDate(DATA.workDays);
  const dates = Object.keys(shifts).sort().slice(-14);
  const labels = dates.map(d => new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }));
  const mArr = dates.map(d => shifts[d]?.morning || 0);
  const aArr = dates.map(d => shifts[d]?.afternoon || 0);
  const nArr = dates.map(d => shifts[d]?.night || 0);

  charts.hc = new Chart(document.getElementById('chartHC'), {
    type: 'bar',
    data: { labels, datasets: [
      { label: 'Morning', data: mArr, backgroundColor: '#38bdf8' },
      { label: 'Afternoon', data: aArr, backgroundColor: '#facc15' },
      { label: 'Night', data: nArr, backgroundColor: '#c084fc' }
    ]},
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 } } }, scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } } } }
  });

  // Downtime chart
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
  const byCause = {};
  DATA.dailyLog.forEach(r => {
    const d = parseDateDMY(r.Date || r.date);
    if (!d || d < cutoff) return;
    const h = delayHours(r.Delays || r.delays);
    if (h > 0) {
      const cause = delayCause(r.Delays || r.delays) || 'Other';
      byCause[cause] = (byCause[cause] || 0) + h;
    }
  });
  const sorted = Object.entries(byCause).sort((a, b) => b[1] - a[1]).slice(0, 10);
  if (sorted.length > 0) {
    const delayColors = ['#f87171','#fb923c','#facc15','#4ade80','#38bdf8','#c084fc'];
    charts.delay = new Chart(document.getElementById('chartDelay'), {
      type: 'bar',
      data: { labels: sorted.map(([c]) => c.length > 30 ? c.slice(0, 30) + '…' : c), datasets: [{ data: sorted.map(([, h]) => h), backgroundColor: sorted.map((_, i) => delayColors[i % delayColors.length]) }] },
      options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, title: { display: true, text: 'Hours', color: '#64748b', font: { size: 11 } } } } }
    });
  }
}

function renderAll() {
  renderStats();
  renderCharts();
  renderJournal();
  renderTeam();
  renderProgress();
}

let currentJournalMonth = 'all';

function renderJournal(monthKey = 'all') {
  const months = {};
  DATA.dailyLog.forEach(r => {
    const d = parseDateDMY(r.Date || r.date);
    if (!d) return;
    const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    if (!months[k]) months[k] = d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
  });
  const monthKeys = Object.keys(months).sort().reverse();
  const current = monthKey === 'all' ? monthKeys[0] : monthKey;

  const filterEl = document.getElementById('monthFilter');
  filterEl.innerHTML = `<span class="filter-label">Month:</span>` +
    monthKeys.map(k => `<div class="pill ${k === current ? 'active' : ''}" onclick="setJournalMonth('${k}', this)">${months[k]}</div>`).join('') +
    `<div class="pill ${monthKey === 'all' ? 'active' : ''}" onclick="setJournalMonth('all', this)">All time</div>`;

  const filtered = monthKey === 'all'
    ? DATA.dailyLog
    : DATA.dailyLog.filter(r => {
        const d = parseDateDMY(r.Date || r.date);
        if (!d) return false;
        const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        return k === current;
      });

  const byMonth = {};
  filtered.forEach(r => {
    const d = parseDateDMY(r.Date || r.date);
    if (!d) return;
    const mk = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    const ml = d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    if (!byMonth[mk]) byMonth[mk] = { label: ml, entries: [] };
    byMonth[mk].entries.push({ ...r, _d: d });
  });

  const container = document.getElementById('journalEntries');
  if (!Object.keys(byMonth).length) { container.innerHTML = '<div class="loading">No entries found.</div>'; return; }

  const shifts = computeShiftsByDate(DATA.workDays);
  let html = '';
  Object.entries(byMonth).sort((a, b) => b[0].localeCompare(a[0])).forEach(([mk, { label, entries }]) => {
    html += `<div class="month-group"><div class="month-label">${label} <span class="month-count">${entries.length} entries</span></div>`;
    entries.forEach(r => {
      const dk = r._d.toISOString().slice(0, 10);
      const sh = shifts[dk] || { total: 0, morning: 0, afternoon: 0, night: 0 };
      const dh = delayHours(r.Delays || r.delays);
      const section = (r['Section / System'] || r.section || '').trim();
      const acts = (r.Activities || r.activities || '').split(',').map(s => s.trim()).filter(Boolean);
      const hse = (r['HSE Activities'] || r.hse_activities || '').trim();
      const notes = (r.Notes || r.notes || '').trim();
      const delays = (r.Delays || r.delays || '').trim();
      const editor = (r.Editor || r.editor || '').trim();
      const dotColor = section.includes('Dematic') ? '#38bdf8' : section.includes('TGW') ? '#facc15' : '#64748b';

      html += `<div class="day-entry">
        <div class="day-header">
          <div class="day-date-block">
            <div class="day-date-num">${r._d.getDate()}</div>
            <div class="day-date-weekday">${r._d.toLocaleDateString('en-GB', { weekday: 'short' })}</div>
          </div>
          <div class="props">
            ${sh.total > 0 ? `<div class="prop green"><span class="prop-label">HC</span><span class="prop-value">${sh.total}</span></div>` : ''}
            ${sh.morning > 0 ? `<div class="prop"><span class="prop-label">M</span><span class="prop-value">${sh.morning}</span></div>` : ''}
            ${sh.afternoon > 0 ? `<div class="prop"><span class="prop-label">A</span><span class="prop-value">${sh.afternoon}</span></div>` : ''}
            ${sh.night > 0 ? `<div class="prop" style="border-color:rgba(56,189,248,0.3)"><span class="prop-label">N</span><span class="prop-value">${sh.night}</span></div>` : ''}
            ${dh > 0 ? `<div class="prop red"><span class="prop-label">Delay</span><span class="prop-value">${dh}h</span></div>` : ''}
            ${section ? `<div class="prop"><span class="dot" style="width:5px;height:5px;border-radius:50%;background:${dotColor};flex-shrink:0;display:inline-block;margin-right:4px"></span><span class="prop-value" style="font-size:11px;color:var(--muted)">${esc(section)}</span></div>` : ''}
          </div>
        </div>
        ${acts.length > 0 ? `<div class="section"><div class="section-label"><div class="dot" style="background:#38bdf8"></div>Activities</div><div class="section-content">${acts.map(a => `<span class="activity-item">${esc(a)}</span>`).join('')}</div></div>` : ''}
        ${dh > 0 && delays ? `<div class="section"><div class="section-label"><div class="dot" style="background:#f87171"></div>Delays</div><div class="section-content">${esc(delays)}</div></div>` : ''}
        ${hse ? `<div class="section"><div class="section-label"><div class="dot" style="background:#4ade80"></div>HSE</div><div class="section-content">${esc(hse)}</div></div>` : ''}
        ${notes ? `<div class="section"><div class="section-label"><div class="dot" style="background:#facc15"></div>Notes</div><div class="section-content">${esc(notes)}</div></div>` : ''}
        ${editor ? `<div class="entry-footer">Logged by ${esc(editor)}</div>` : ''}
      </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

function setJournalMonth(key, el) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  currentJournalMonth = key;
  renderJournal(key);
}

const DEPT_ORDER = ['Site Management','Commissioning','Mechanical','Electrical','Quality / HSE','Project Management','Engineering','Directors','Other'];
const DEPT_QUALS = {
  'Site Management': ['Site Manager','Onsite Manager'],
  'Commissioning': ['Commissioning Engineer'],
  'Mechanical': ['Fitter','Apprentice'],
  'Electrical': ['Electric','Electric Fitter'],
  'Quality / HSE': ['EHS Advisor','EHS Manager','Quality manager'],
  'Project Management': ['Project Manager','Project Engineer'],
  'Engineering': ['Engineer'],
  'Directors': ['Director']
};

function getDept(q) {
  if (!q) return 'Other';
  for (const [dept, quals] of Object.entries(DEPT_QUALS)) {
    if (quals.some(qq => q.includes(qq))) return dept;
  }
  return 'Other';
}

function renderTeam() {
  const seen = new Set();
  const rows = DATA.team.filter(r => {
    const key = `${r['First Name'] || ''}${r['Last Name'] || ''}`.trim();
    if (!key || seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  const byDept = {};
  rows.forEach(r => {
    const dept = getDept(r.Qualification || r.qualification);
    if (!byDept[dept]) byDept[dept] = [];
    byDept[dept].push(r);
  });
  const ordered = [...DEPT_ORDER.filter(d => byDept[d]), ...Object.keys(byDept).filter(d => !DEPT_ORDER.includes(d))];
  let html = '';
  ordered.forEach(dept => {
    const people = byDept[dept].sort((a, b) => `${a['Last Name']||''}`.localeCompare(`${b['Last Name']||''}`));
    html += `<div class="team-dept"><div class="dept-header">${dept} <span class="dept-count">${people.length}</span></div>`;
    people.forEach(p => {
      const name = `${p['First Name'] || ''} ${p['Last Name'] || ''}`.trim();
      html += `<div class="person-row"><div class="person-name">${esc(name)}</div><div class="person-qual">${esc(p.Qualification || '')}</div><div class="person-company">${esc(p.Company || '')}</div></div>`;
    });
    html += '</div>';
  });
  document.getElementById('teamContent').innerHTML = html || '<div class="loading">No team data.</div>';
}

function renderProgress() {
  const items = DATA.siteProgress.filter(r => r.Description || r.description);
  let html = '<div class="month-label" style="margin-bottom:16px">Site Progress</div>';
  if (!items.length) { document.getElementById('progressContent').innerHTML = '<div class="loading">No data.</div>'; return; }
  html += '<div style="display:grid;gap:10px">';
  items.forEach(r => {
    const progress = parseInt(r.Progress || r.progress || 0);
    const barColor = progress >= 80 ? '#16A34A' : progress >= 40 ? '#CA8A04' : '#DC2626';
    const section = r.Section || r.section || '';
    const assigned = r['Assigned To'] || r.assigned_to || '';
    const plannedStart = r['Planned Start'] || r.planned_start || '';
    const plannedFinish = r['Planned Finish'] || r.planned_finish || '';
    const delay = r['Expected Delay'] || r.expected_delay || '';
    html += `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <div style="font-size:13px;font-weight:500;flex:1">${esc(r.Description || r.description || '')}</div>
        <div style="font-size:13px;font-weight:700;color:${barColor};min-width:40px;text-align:right">${progress}%</div>
      </div>
      <div style="background:var(--bg3);border-radius:4px;height:6px;overflow:hidden">
        <div style="width:${progress}%;background:${barColor};height:100%;border-radius:4px;transition:width 0.3s"></div>
      </div>
      <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--muted)">
        ${section ? `<span>${esc(section)}</span>` : ''}
        ${assigned ? `<span>→ ${esc(assigned)}</span>` : ''}
        ${plannedStart ? `<span>Start: ${esc(plannedStart)}</span>` : ''}
        ${plannedFinish ? `<span>Finish: ${esc(plannedFinish)}</span>` : ''}
        ${delay && delay !== '0 days' ? `<span style="color:var(--red)">⚠ ${esc(delay)}</span>` : ''}
      </div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('progressContent').innerHTML = html;
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  const titles = { journal: 'Daily Journal', team: 'Team', progress: 'Site Progress' };
  document.getElementById('viewTitle').textContent = titles[name];
  window.scrollTo(0, 0);
}

loadAll();
</script>

</html>
