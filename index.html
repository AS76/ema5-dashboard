<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMA5 Operations — Daily Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f172a; --bg2: #1e293b; --bg3: #263548;
      --border: #1e3a5f; --text: #e2e8f0; --muted: #64748b;
      --accent: #38bdf8; --green: #4ade80; --yellow: #facc15;
      --red: #f87171; --purple: #c084fc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; font-size: 14px; }

    /* ── Top bar ── */
    .topbar { position: sticky; top: 0; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(8px); }
    .topbar-left { display: flex; align-items: center; gap: 0; }
    .topbar-tabs { font-size: 13px; font-weight: 500; padding: 6px 16px; cursor: pointer; color: var(--muted); border-radius: 8px; transition: all 0.15s; user-select: none; }
    .site-name span { color: var(--muted); font-weight: 300; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .sync-time { font-size: 12px; color: var(--muted); }
    .btn { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg2); color: var(--text); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
    .topbar-tabs { font-size: 13px; font-weight: 500; padding: 6px 14px; cursor: pointer; color: var(--muted); border-radius: 6px; transition: all 0.15s; user-select: none; margin-right: 4px; }
    .topbar-tabs:hover { color: var(--accent); }
    .topbar-tabs.active { background: var(--bg2); color: var(--accent); }
    .btn:hover { background: var(--bg3); border-color: var(--accent); }

    /* ── Team view ── */
    .team-dept { margin-bottom: 36px; }
    .dept-header { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 0 0 12px 2px; border-bottom: 1px solid var(--border); margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
    .dept-count { font-size: 11px; font-weight: 400; letter-spacing: 0; text-transform: none; }
    .person-row { display: flex; align-items: center; gap: 16px; padding: 10px 0; border-bottom: 1px solid rgba(30,58,95,0.4); }
    .person-row:last-child { border-bottom: none; }
    .person-name { font-size: 14px; font-weight: 500; min-width: 180px; }
    .person-qual { font-size: 12px; color: var(--muted); min-width: 160px; }
    .person-company { font-size: 12px; color: var(--muted); flex: 1; }
    .person-seen { font-size: 11px; color: var(--muted); min-width: 80px; text-align: right; font-family: monospace; }
    .person-emp { font-size: 11px; color: var(--muted); min-width: 80px; font-family: monospace; }
    .view { display: none; }
    .view.active { display: block; }

    /* ── Content ── */
    .content { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ── Month group ── */
    .month-group { margin-bottom: 48px; }
    .month-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 0 0 20px 2px; border-bottom: 1px solid var(--border); margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
    .month-count { font-size: 11px; font-weight: 400; letter-spacing: 0; color: var(--muted); text-transform: none; }

    /* ── Day entry ── */
    .day-entry { padding: 24px 0 24px; border-bottom: 1px solid rgba(30,58,95,0.6); }
    .day-entry:last-child { border-bottom: none; }

    /* ── Day header ── */
    .day-header { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 16px; }
    .day-date-block { flex-shrink: 0; width: 52px; text-align: center; }
    .day-date-num { font-size: 32px; font-weight: 300; line-height: 1; color: var(--accent); letter-spacing: -1px; }
    .day-date-weekday { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-top: 2px; }

    /* ── Properties row ── */
    .props { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; align-items: flex-start; padding-top: 4px; }
    .prop { display: flex; align-items: center; gap: 5px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 12px; }
    .prop-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .prop-value { font-weight: 500; }
    .prop.green .prop-value { color: var(--green); }
    .prop.red .prop-value { color: var(--red); }
    .prop.yellow .prop-value { color: var(--yellow); }
    .prop.accent .prop-value { color: var(--accent); }

    /* ── Section ── */
    .section { margin-bottom: 12px; }
    .section:last-child { margin-bottom: 0; }
    .section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
    .section-label .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .section-content { font-size: 13px; color: var(--text); padding-left: 11px; }
    .section-content p { margin-bottom: 4px; }
    .section-content p:last-child { margin-bottom: 0; }
    .section-content.empty { color: var(--muted); font-style: italic; font-size: 12px; }

    /* ── Activity items ── */
    .activity-item { display: inline; }
    .activity-item::after { content: ' ·'; color: var(--muted); }
    .activity-item:last-child::after { content: ''; }

    /* ── Delay badge ── */
    .delay-item { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
    .delay-hours { font-size: 13px; font-weight: 700; color: var(--red); min-width: 28px; }
    .delay-cause { font-size: 13px; color: var(--text); }

    /* ── Weather ── */
    .weather-row { display: flex; gap: 12px; align-items: center; }
    .weather-item { font-size: 12px; color: var(--muted); }
    .weather-item span { color: var(--text); font-weight: 500; }

    /* ── Tags / badges ── */
    .tag { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .tag-blue { background: rgba(56,189,248,0.15); color: var(--accent); }
    .tag-green { background: rgba(74,222,128,0.15); color: var(--green); }
    .tag-yellow { background: rgba(250,204,21,0.15); color: var(--yellow); }
    .tag-red { background: rgba(248,113,113,0.15); color: var(--red); }
    .tag-purple { background: rgba(192,132,252,0.15); color: var(--purple); }

    /* ── HSE badge ── */
    .hse-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

    /* ── Editor ── */
    .entry-footer { margin-top: 10px; font-size: 11px; color: var(--muted); padding-left: 11px; }
    .entry-footer a { color: var(--muted); text-decoration: none; }
    .entry-footer a:hover { color: var(--accent); }

    /* ── Charts section ── */
    .charts-section { margin-bottom: 48px; }
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
    .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .chart-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 12px; }
    .chart-wrap { position: relative; height: 180px; }
    .chart-wrap-tall { position: relative; height: 260px; }

    /* ── Filter / nav ── */
    .filter-row { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; align-items: center; }
    .filter-label { font-size: 12px; color: var(--muted); margin-right: 4px; }
    .pill { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); cursor: pointer; font-size: 12px; color: var(--muted); transition: all 0.15s; user-select: none; }
    .pill:hover { border-color: var(--accent); color: var(--accent); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #0f172a; font-weight: 600; }

    /* ── Loading ── */
    .loading { padding: 60px 0; text-align: center; color: var(--muted); font-size: 14px; }

    @media (max-width: 640px) {
      .content { padding: 24px 16px 60px; }
      .day-header { gap: 14px; }
      .day-date-num { font-size: 26px; }
      .charts-grid { grid-template-columns: 1fr; }
      .topbar { padding: 0 16px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-tabs" id="tab-journal" onclick="showView('journal')">Journal</div>
    <div class="topbar-tabs" id="tab-team" onclick="showView('team')">Team</div>
  </div>
  <div class="topbar-right">
    <span class="sync-time" id="syncTime">Loading...</span>
    <button class="btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</div>

<div class="content">
  <!-- Stats + Charts (moved inside view-journal) -->
    <div class="filter-row" id="monthFilter"></div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Headcount — Last 14 Days</div>
        <div class="chart-wrap"><canvas id="chartHC"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Downtime by Cause (30d)</div>
        <div class="chart-wrap"><canvas id="chartDowntime"></canvas></div>
      </div>
    </div>
  </div>

  <!-- Journal view -->
  <div class="view active" id="view-journal">
    <div class="charts-section">
      <div class="month-label">Overview</div>
      <div class="filter-row" id="monthFilter"></div>
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-title">Headcount — Last 14 Days</div>
          <div class="chart-wrap"><canvas id="chartHC"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Downtime by Cause (30d)</div>
          <div class="chart-wrap"><canvas id="chartDowntime"></canvas></div>
        </div>
      </div>
    </div>
    <div id="journalEntries"></div>
  </div>

  <!-- Team view -->
  <div class="view" id="view-team">
    <div id="teamContent"></div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxGtL_0WUsZXjhorA6WhCI2zzv6JqP9kDmtK4q7CExt5Z4v7nyqJDcMtTyg8Nq9UYr76g/exec';
const DATA = { dailyLog: [], issues: [], loaded: false };
let charts = {};

async function fetchSheet(sheet) {
  const r = await fetch(GAS_URL + '?sheet=' + encodeURIComponent(sheet));
  if (!r.ok) throw new Error(r.status);
  const j = await r.json();
  return j.data;
}

function parseRows(raw) {
  if (!raw || raw.length < 2) return [];
  const hdrs = raw[0].map(h => String(h || '').trim());
  return raw.slice(1).map(row => {
    const o = {};
    hdrs.forEach((h, i) => { o[h] = row[i] ?? ''; });
    return o;
  });
}

function delayHours(text) {
  if (!text || text === '-' || text === '') return 0;
  let h = 0;
  const m = String(text).match(/(\d+(?:\.\d+)?)\s*h(?!ou)/gi);
  if (m) h += m.reduce((s, x) => s + parseFloat(x), 0);
  const mm = String(text).match(/(\d+)\s*m(?!ou)/gi);
  if (mm) h += mm.reduce((s, x) => s + parseFloat(x) / 60, 0);
  return Math.round(h * 10) / 10;
}

function delayCause(text) {
  if (!text || text === '-' || text === '') return '';
  return String(text).trim().split('.')[0].trim();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadAll() {
  try {
    const [dl, iss, team] = await Promise.all([fetchSheet('Daily Log'), fetchSheet('Issues'), fetchSheet('Team')]);
    DATA.dailyLog = parseRows(dl);
    DATA.issues = parseRows(iss);
    DATA.team = parseRows(team);
    DATA.loaded = true;
    document.getElementById('syncTime').textContent = 'Synced ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
    renderAll();
  } catch(e) {
    document.getElementById('journalEntries').innerHTML = '<div class="loading">Error: ' + esc(e.message) + '</div>';
  }
}

function renderAll() {
  // Build date → issue map
  const issueByDate = {};
  DATA.issues.forEach(r => {
    const d = new Date(r.Date);
    if (isNaN(d)) return;
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    issueByDate[k] = r;
  });

  // Sort entries by date desc
  const sorted = [...DATA.dailyLog].sort((a, b) => new Date(b.Date) - new Date(a.Date));

  // Month filter pills
  const months = {};
  sorted.forEach(r => {
    const d = new Date(r.Date);
    if (isNaN(d)) return;
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!months[k]) months[k] = d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
  });
  const monthKeys = Object.keys(months).sort().reverse();
  const firstMonth = monthKeys[0];

  const filterEl = document.getElementById('monthFilter');
  filterEl.innerHTML =
    `<span class="filter-label">Month:</span>` +
    monthKeys.map((k, i) => `<div class="pill ${i===0?'active':''}" onclick="setMonthFilter('${k}', this)">${months[k]}</div>`).join('') +
    `<div class="pill" onclick="setMonthFilter('all', this)">All time</div>`;

  renderJournal(firstMonth);
  renderCharts();
}

let currentMonth = null;
function setMonthFilter(key, el) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  currentMonth = key;
  renderJournal(key);
}

function renderJournal(monthKey) {
  const sorted = [...DATA.dailyLog].sort((a, b) => new Date(b.Date) - new Date(a.Date));

  const issueByDate = {};
  DATA.issues.forEach(r => {
    const d = new Date(r.Date);
    if (isNaN(d)) return;
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    issueByDate[k] = r;
  });

  const filtered = monthKey === 'all' ? sorted : sorted.filter(r => {
    const d = new Date(r.Date);
    if (isNaN(d)) return false;
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    return k === monthKey;
  });

  // Group by year-month
  const byMonth = {};
  filtered.forEach(r => {
    const d = new Date(r.Date);
    if (isNaN(d)) return;
    const mk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const ml = d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    if (!byMonth[mk]) byMonth[mk] = { label: ml, entries: [] };
    byMonth[mk].entries.push({ ...r, _d: d });
  });

  const container = document.getElementById('journalEntries');
  if (Object.keys(byMonth).length === 0) {
    container.innerHTML = '<div class="loading">No entries found.</div>';
    return;
  }

  let html = '';
  Object.entries(byMonth).sort((a, b) => b[0].localeCompare(a[0])).forEach(([mk, { label, entries }]) => {
    html += `<div class="month-group">
      <div class="month-label">
        ${label}
        <span class="month-count">${entries.length} ${entries.length === 1 ? 'entry' : 'entries'}</span>
      </div>`;

    entries.forEach(r => {
      const dk = `${r._d.getFullYear()}-${String(r._d.getMonth()+1).padStart(2,'0')}-${String(r._d.getDate()).padStart(2,'0')}`;
      const iss = issueByDate[dk];
      const total = Number(r.Total) || 0;
      const mCount = Number(r.Morning) || 0;
      const aCount = Number(r.Afternoon) || 0;
      const nCount = Number(r.Night) || 0;
      const dh = iss ? delayHours(iss.Delays) : 0;
      const dc = iss ? delayCause(iss.Delays) : '';
      const acts = iss ? (iss.Activities || '') : '';
      const hse = iss ? (iss['HSE Activities'] || '') : '';
      const notes = iss ? (iss.Notes || '') : '';
      const editor = iss ? (iss.Editor || '') : '';
      const weather = iss ? (iss.Weather || '') : '';
      const temp = iss ? (iss.Temperature || '') : '';
      const completed = iss ? (iss['Completed Tasks %'] || '') : '';
      const section = iss ? (iss.Section || '') : '';
      const actParts = acts.split(',').map(s => s.trim()).filter(Boolean);

      // Section color dot
      const dotColor = section.includes('Dematic') || section.includes('XBelt') ? '#38bdf8' :
                        section.includes('TGW') ? '#facc15' : '#64748b';

      html += `<div class="day-entry">
        <div class="day-header">
          <div class="day-date-block">
            <div class="day-date-num">${r._d.getDate()}</div>
            <div class="day-date-weekday">${r._d.toLocaleDateString('en-GB', { weekday: 'short' })}</div>
          </div>
          <div class="props">
            ${total > 0 ? `<div class="prop green"><span class="prop-label">HC</span><span class="prop-value">${total}</span></div>` : ''}
            ${mCount > 0 ? `<div class="prop"><span class="prop-label">M</span><span class="prop-value">${mCount}</span></div>` : ''}
            ${aCount > 0 ? `<div class="prop"><span class="prop-label">A</span><span class="prop-value">${aCount}</span></div>` : ''}
            ${nCount > 0 ? `<div class="prop accent"><span class="prop-label">N</span><span class="prop-value">${nCount}</span></div>` : ''}
            ${dh > 0 ? `<div class="prop red"><span class="prop-label">Delay</span><span class="prop-value">${dh}h</span></div>` : ''}
            ${completed && completed !== '0' ? `<div class="prop yellow"><span class="prop-label">Done</span><span class="prop-value">${completed}</span></div>` : ''}
            ${section ? `<div class="prop" style="border-color:rgba(56,189,248,0.3)"><span class="dot" style="width:5px;height:5px;border-radius:50%;background:${dotColor};flex-shrink:0"></span><span class="prop-value" style="font-size:11px;color:var(--muted)">${esc(section)}</span></div>` : ''}
          </div>
        </div>

        ${actParts.length > 0 ? `<div class="section">
          <div class="section-label"><div class="dot" style="background:#38bdf8"></div>Activities</div>
          <div class="section-content">${actParts.map(a => `<span class="activity-item">${esc(a)}</span>`).join('')}</div>
        </div>` : ''}

        ${dh > 0 && dc ? `<div class="section">
          <div class="section-label"><div class="dot" style="background:#f87171"></div>Delays</div>
          <div class="section-content">
            <div class="delay-item">
              <div class="delay-hours">${dh}h</div>
              <div class="delay-cause">${esc(dc)}</div>
            </div>
          </div>
        </div>` : ''}

        ${hse ? `<div class="section">
          <div class="section-label"><div class="dot" style="background:#4ade80"></div>HSE</div>
          <div class="section-content">${esc(hse)}</div>
        </div>` : ''}

        ${notes ? `<div class="section">
          <div class="section-label"><div class="dot" style="background:#facc15"></div>Notes</div>
          <div class="section-content">${esc(notes)}</div>
        </div>` : ''}

        ${weather || temp ? `<div class="section">
          <div class="section-label"><div class="dot" style="background:#94a3b8"></div>Weather</div>
          <div class="section-content">
            <div class="weather-row">
              ${weather ? `<div class="weather-item">${esc(weather)}</div>` : ''}
              ${temp ? `<div class="weather-item">Temp: <span>${esc(temp)}</span></div>` : ''}
            </div>
          </div>
        </div>` : ''}

        ${editor ? `<div class="entry-footer">Logged by ${esc(editor)}</div>` : ''}
      </div>`;
    });

    html += '</div>';
  });

  container.innerHTML = html;
}

function renderCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  charts = {};

  const sorted = [...DATA.dailyLog].sort((a, b) => new Date(a.Date) - new Date(b.Date));
  const last14 = sorted.slice(-14);

  // Headcount 14d
  const labels = last14.map(r => {
    const d = new Date(r.Date);
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
  });
  charts.hc = new Chart(document.getElementById('chartHC'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Morning', data: last14.map(r => Number(r.Morning)||0), backgroundColor: '#38bdf8' },
        { label: 'Afternoon', data: last14.map(r => Number(r.Afternoon)||0), backgroundColor: '#facc15' },
        { label: 'Night', data: last14.map(r => Number(r.Night)||0), backgroundColor: '#c084fc' }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 } } }, scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } } }
  });

  // Downtime by cause 30d
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
  const recent = DATA.issues.filter(r => new Date(r.Date) >= cutoff);
  const byCause = {};
  recent.forEach(r => {
    const h = delayHours(r.Delays);
    if (h > 0) {
      const cause = delayCause(r.Delays) || 'Unknown';
      byCause[cause] = (byCause[cause] || 0) + h;
    }
  });
  const sortedCauses = Object.entries(byCause).sort((a, b) => b[1] - a[1]);
  const colors = ['#f87171','#fb923c','#facc15','#4ade80','#38bdf8','#c084fc','#a78bfa','#f472b6'];

  if (sortedCauses.length > 0) {
    charts.downtime = new Chart(document.getElementById('chartDowntime'), {
      type: 'bar',
      data: {
        labels: sortedCauses.map(([c]) => c.length > 35 ? c.slice(0,35)+'\u2026' : c),
        datasets: [{ data: sortedCauses.map(([,h]) => h), backgroundColor: sortedCauses.map((_,i) => colors[i%colors.length]) }]
      },
      options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, title: { display: true, text: 'Hours', color: '#64748b', font: { size: 11 } } } } }
    });
  }
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.topbar-tabs').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  const titles = { journal: 'Daily Journal', team: 'Team' };
  document.querySelector('.site-name span').textContent = ' / ' + titles[name];
  if (name === 'team' && DATA.loaded) renderTeam();
}

function renderTeam() {
  const rows = [...DATA.team].sort((a, b) => (a.Name||'').localeCompare(b.Name||''));
  const DEPT_ORDER = ['Site Management','Commissioning','Mechanical','Electrical','Quality / HSE','Project Management','Engineering','Directors'];
  const DEPT_QUALS = {
    'Site Management': ['Site Manager','Onsite Manager'],
    'Commissioning': ['Commissioning Engineer'],
    'Mechanical': ['Fitter','Apprentice'],
    'Electrical': ['Electric','Electric Fitter'],
    'Quality / HSE': ['EHS Advisor','EHS Manager','Quality manager'],
    'Project Management': ['Project Manager','Project Engineer'],
    'Engineering': ['Engineer'],
    'Directors': ['Director']
  };
  const getDept = q => {
    for (const [dept, quals] of Object.entries(DEPT_QUALS)) {
      if (quals.some(qq => (q||'').includes(qq))) return dept;
    }
    return 'Other';
  };
  const byDept = {};
  rows.forEach(r => {
    const dept = getDept(r.Qualification);
    if (!byDept[dept]) byDept[dept] = [];
    byDept[dept].push(r);
  });
  const ordered = [...DEPT_ORDER.filter(d => byDept[d]), ...Object.keys(byDept).filter(d => !DEPT_ORDER.includes(d))];
  let html = '';
  ordered.forEach(dept => {
    const people = byDept[dept].sort((a, b) => (a.Name||'').localeCompare(b.Name||''));
    html += `<div class="team-dept">
      <div class="dept-header">${dept} <span class="dept-count">${people.length}</span></div>`;
    people.forEach(p => {
      const lastSeen = p['Last Seen'] ? new Date(p['Last Seen']).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'}) : '—';
      html += `<div class="person-row">
        <div class="person-name">${esc(p.Name||'')}</div>
        <div class="person-qual">${esc(p.Qualification||'')}</div>
        <div class="person-company">${esc(p.Company||'')}</div>
        <div class="person-emp">${esc(p['Employee No']||'')}</div>
        <div class="person-seen">${lastSeen}</div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('teamContent').innerHTML = html;
}

// Fix: clear old charts-section that exists outside views
document.querySelectorAll('.charts-section').forEach(el => { if (!el.closest('.view')) el.remove(); });


loadAll();
</script>
