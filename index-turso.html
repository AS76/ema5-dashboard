<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMA5 Operations — Turso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root { --bg: #FAF7F2; --bg2: #FFFFFF; --bg3: #F0EDE8; --border: #E5DFD6; --text: #2D2418; --muted: #8C7B6E; --accent: #2563EB; --green: #16A34A; --yellow: #CA8A04; --red: #DC2626; --purple: #7C3AED; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; background: var(--bg); }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; font-size: 14px; }
    a { color: var(--accent); text-decoration: none; }

    .topbar { position: sticky; top: 0; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .site-name { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    .site-name span { color: var(--muted); font-weight: 300; }
    .sync-time { font-size: 12px; color: var(--muted); }
    .tabs { display: flex; gap: 4px; }
    .tab { padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--muted); border: 1px solid transparent; transition: all 0.15s; }
    .tab:hover { color: var(--accent); }
    .tab.active { background: var(--bg2); color: var(--accent); border-color: var(--border); }

    .content { max-width: 1000px; margin: 0 auto; padding: 32px 24px 80px; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
    .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 4px; }
    .stat-value { font-size: 26px; font-weight: 700; }
    .stat-value.accent { color: var(--accent); }
    .stat-value.red { color: var(--red); }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
    .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .chart-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 12px; }
    .chart-wrap { height: 200px; position: relative; }

    .month-group { margin-bottom: 40px; }
    .month-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
    .month-count { font-size: 11px; font-weight: 400; letter-spacing: 0; text-transform: none; }

    .day-entry { padding: 20px 0; border-bottom: 1px solid rgba(229,223,214,0.5); }
    .day-entry:last-child { border-bottom: none; }
    .day-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 12px; }
    .day-date-block { min-width: 48px; text-align: center; }
    .day-date-num { font-size: 22px; font-weight: 700; line-height: 1; }
    .day-date-weekday { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .props { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .prop { display: inline-flex; align-items: center; gap: 4px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; font-size: 12px; }
    .prop.green { background: rgba(22,163,74,0.08); border-color: rgba(22,163,74,0.2); }
    .prop.red { background: rgba(220,38,38,0.08); border-color: rgba(220,38,38,0.2); }
    .prop-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .prop-value { font-weight: 600; }
    .prop.green .prop-value { color: var(--green); }
    .prop.red .prop-value { color: var(--red); }

    .section { margin-bottom: 10px; }
    .section-label { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 4px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .section-content { font-size: 13px; color: var(--text); padding-left: 12px; }
    .section-content .activity-item { display: inline-block; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; margin: 2px 4px 2px 0; font-size: 12px; }

    .filter-label { font-size: 12px; font-weight: 500; color: var(--muted); margin-right: 8px; }
    .pill { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--muted); background: var(--bg3); border: 1px solid transparent; margin: 2px; transition: all 0.15s; }
    .pill:hover { color: var(--accent); }
    .pill.active { background: var(--accent); color: white; }

    .view { display: none; }
    .view.active { display: block; }
    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
    .error-msg { background: rgba(220,38,38,0.08); border: 1px solid rgba(220,38,38,0.2); border-radius: 8px; padding: 16px; color: var(--red); font-size: 13px; }
    .entry-footer { font-size: 11px; color: var(--muted); margin-top: 8px; font-style: italic; }

    .section-badge { display: inline-block; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-left: 6px; vertical-align: middle; }
    .section-badge.dematic { background: rgba(56,189,248,0.15); color: #0EA5E9; }
    .section-badge.tgw { background: rgba(250,204,21,0.15); color: #CA8A04; }

    /* Progress view */
    .progress-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
    .progress-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .progress-desc { font-size: 13px; font-weight: 500; flex: 1; }
    .progress-pct { font-size: 16px; font-weight: 700; min-width: 45px; text-align: right; }
    .progress-bar-wrap { background: var(--bg3); border-radius: 4px; height: 8px; overflow: hidden; margin-bottom: 8px; }
    .progress-bar { height: 100%; border-radius: 4px; transition: width 0.4s; }
    .progress-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 11px; color: var(--muted); }
    .progress-meta strong { color: var(--text); }
    .delay-badge { color: var(--red); font-weight: 600; }

    /* Resource plan */
    .week-row { display: grid; grid-template-columns: 80px 1fr 1fr 120px; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: center; font-size: 13px; }
    .week-header { font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .week-num { font-weight: 600; }
    .bar-wrap { background: var(--bg3); border-radius: 4px; height: 20px; overflow: hidden; }
    .bar-plan { height: 100%; background: var(--accent); opacity: 0.5; }
    .bar-actual { height: 100%; background: var(--green); }
    .pct-change { font-weight: 700; }
    .pct-change.pos { color: var(--green); }
    .pct-change.neg { color: var(--red); }

    .company-filter { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .company-pill { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; background: var(--bg3); color: var(--muted); border: 1px solid transparent; transition: all 0.15s; }
    .company-pill.active { background: var(--accent); color: white; }

    .hc-day { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; }
    .hc-day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .hc-date { font-weight: 600; font-size: 13px; }
    .hc-total { font-size: 20px; font-weight: 700; color: var(--accent); }
    .hc-shifts { display: flex; gap: 8px; font-size: 12px; color: var(--muted); }
    .hc-shifts span { background: var(--bg3); padding: 2px 8px; border-radius: 4px; }

    .view-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .view-title { font-size: 16px; font-weight: 700; }
    .view-subtitle { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <div class="site-name">EMA5 <span>// Turso DB</span></div>
    </div>
    <div class="topbar-right">
      <div class="sync-time" id="syncTime">Connecting...</div>
      <div class="tabs">
        <div class="tab active" id="tab-overview" onclick="showView('overview')">Overview</div>
        <div class="tab" id="tab-journal" onclick="showView('journal')">Journal</div>
        <div class="tab" id="tab-headcount" onclick="showView('headcount')">Headcount</div>
        <div class="tab" id="tab-progress" onclick="showView('progress')">Progress</div>
        <div class="tab" id="tab-resources" onclick="showView('resources')">Resources</div>
      </div>
    </div>
  </div>

  <div class="content">
    <!-- OVERVIEW -->
    <div class="view active" id="view-overview">
      <div class="stats-row" id="statsRow"></div>
      <div class="charts-row">
        <div class="chart-card">
          <div class="chart-title">Daily Headcount — Last 14 Days</div>
          <div class="chart-wrap"><canvas id="chartHC"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Progress Overview</div>
          <div class="chart-wrap"><canvas id="chartProgress"></canvas></div>
        </div>
      </div>
      <div id="overviewRecent"></div>
    </div>

    <!-- JOURNAL -->
    <div class="view" id="view-journal">
      <div class="view-header">
        <div>
          <div class="view-title">Daily Journal</div>
          <div class="view-subtitle" id="journalSubtitle">79 entries</div>
        </div>
      </div>
      <div id="monthFilter" style="margin-bottom:20px"></div>
      <div id="journalEntries"></div>
    </div>

    <!-- HEADCOUNT -->
    <div class="view" id="view-headcount">
      <div class="view-header">
        <div>
          <div class="view-title">Headcount</div>
          <div class="view-subtitle">Daily personnel on site</div>
        </div>
      </div>
      <div class="company-filter" id="companyFilter"></div>
      <div id="headcountEntries"></div>
    </div>

    <!-- PROGRESS -->
    <div class="view" id="view-progress">
      <div class="view-header">
        <div>
          <div class="view-title">Site Progress</div>
          <div class="view-subtitle" id="progressSubtitle">104 items</div>
        </div>
      </div>
      <div id="progressEntries"></div>
    </div>

    <!-- RESOURCES -->
    <div class="view" id="view-resources">
      <div class="view-header">
        <div>
          <div class="view-title">Resource Plan</div>
          <div class="view-subtitle" id="resourcesSubtitle">Weekly plan vs actual</div>
        </div>
      </div>
      <div id="resourceEntries"></div>
    </div>
  </div>

<script>
// ── Turso config ──────────────────────────────────────────────────
var TURSO_DB = 'https://ema5-cleo.aws-eu-west-1.turso.io';
var TURSO_TOKEN = 'eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicnciLCJpYXQiOjE3NzY4NzQ5MDQsImlkIjoiMDE5ZGI1ZmYtMTgwMS03NjQ0LTg1MWYtNzYwYjIxYmEwY2M3IiwicmlkIjoiMzViNWFiZDctMDVhMy00MGQyLTkyMDgtMzQyODYxZGVkMTRhIn0.elg3ZXmgS4oEVhzIpS-W2PDqi18CEavcuxG335Lu2fxAdbvUPD178ArjrLW-kZo2HrOgawDUjlojA1XGyUCKCQ';

var DATA = { dailyLog: [], workDays: [], siteProgress: [], resourcePlan: [], loaded: false };
var CHARTS = {};
var FILTERS = { company: 'all' };

function tursoRows(result) {
  var cols = result.cols.map(function(c) { return c.name; });
  return result.rows.map(function(row) {
    var obj = {};
    cols.forEach(function(col, i) {
      var v = row[i];
      obj[col] = (v && typeof v === 'object' && v.type) ? v.value : v;
    });
    return obj;
  });
}

async function tursoQuery(sql) {
  var payload = JSON.stringify({ stmt: { sql: sql, args: [] } });
  var r = await fetch(TURSO_DB + '/v1/execute', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + TURSO_TOKEN, 'Content-Type': 'application/json' },
    body: payload
  });
  if (!r.ok) throw new Error(r.status + ' — ' + await r.text());
  var json = await r.json();
  if (json.error) throw new Error('Turso error: ' + json.error);
  return json.result;
}

async function loadAll() {
  try {
    var dl = await tursoQuery('SELECT * FROM daily_log ORDER BY "Date" DESC');
    var wd = await tursoQuery('SELECT * FROM work_days ORDER BY "Date" DESC');
    var sp = await tursoQuery('SELECT * FROM site_progress ORDER BY "Progress" DESC');
    var rp = await tursoQuery('SELECT * FROM resource_plan ORDER BY year, week_num');
    DATA.dailyLog = tursoRows(dl);
    DATA.workDays = tursoRows(wd);
    DATA.siteProgress = tursoRows(sp);
    DATA.resourcePlan = tursoRows(rp);
    DATA.loaded = true;
    document.getElementById('syncTime').textContent = 'Synced ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
    renderAll();
  } catch(e) {
    document.getElementById('syncTime').textContent = 'Error';
    document.getElementById('statsRow').innerHTML = '<div class="error-msg" style="grid-column:1/-1">Connection failed: ' + e.message + '</div>';
  }
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderAll() {
  renderStats();
  renderOverview();
  renderJournal();
  renderHeadcount();
  renderProgress();
  renderResources();
}

// ── Stats / Overview ──────────────────────────────────────────────
function renderStats() {
  var shifts = computeHCByDate(DATA.workDays);
  var dates = Object.keys(shifts).sort();
  var today = new Date().toISOString().slice(0, 10);
  var yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  var todayHC = shifts[today] || shifts[yesterday] || { total: 0 };
  var totalDays = dates.length;
  var totalJournal = DATA.dailyLog.length;
  var totalProgress = DATA.siteProgress.length;
  var doneProgress = DATA.siteProgress.filter(function(r) { return (r.Progress || 0) >= 80; }).length;

  document.getElementById('statsRow').innerHTML =
    '<div class="stat-card"><div class="stat-label">Headcount Today</div><div class="stat-value accent">' + (todayHC.total || '-') + '</div><div class="stat-sub">Last 14d avg: ' + (totalDays > 0 ? Math.round(dates.slice(-14).reduce(function(s,d){return s+(shifts[d]?shifts[d].total:0);},0)/Math.min(dates.length,14)) : 0) + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Journal Entries</div><div class="stat-value">' + totalJournal + '</div><div class="stat-sub">Mar–Apr 2026</div></div>' +
    '<div class="stat-card"><div class="stat-label">Progress Items</div><div class="stat-value">' + totalProgress + '</div><div class="stat-sub">' + doneProgress + ' ≥80% complete</div></div>' +
    '<div class="stat-card"><div class="stat-label">Work Days Logged</div><div class="stat-value">' + DATA.workDays.length + '</div><div class="stat-sub">' + (totalDays || '-') + ' active days</div></div>';
}

function renderOverview() {
  // Headcount chart
  var shifts = computeHCByDate(DATA.workDays);
  var last14 = Object.keys(shifts).sort().slice(-14);
  if (CHARTS.hc) CHARTS.hc.destroy();
  var ctxHC = document.getElementById('chartHC');
  if (ctxHC) {
    CHARTS.hc = new Chart(ctxHC, {
      type: 'bar',
      data: {
        labels: last14.map(function(d) { return d.slice(5); }),
        datasets: [{
          label: 'Headcount',
          data: last14.map(function(d) { return shifts[d] ? shifts[d].total : 0; }),
          backgroundColor: '#2563EB'
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
    });
  }

  // Progress chart (by section)
  if (CHARTS.progress) CHARTS.progress.destroy();
  var sections = {};
  DATA.siteProgress.forEach(function(r) {
    var sec = r['Section'] || 'Other';
    if (!sections[sec]) sections[sec] = { total: 0, done: 0 };
    sections[sec].total++;
    if ((r.Progress || 0) >= 80) sections[sec].done++;
  });
  var ctxProg = document.getElementById('chartProgress');
  if (ctxProg) {
    var secLabels = Object.keys(sections);
    CHARTS.progress = new Chart(ctxProg, {
      type: 'doughnut',
      data: {
        labels: secLabels,
        datasets: [{
          data: secLabels.map(function(s) { return sections[s].total; }),
          backgroundColor: ['#2563EB','#16A34A','#CA8A04','#DC2626','#7C3AED','#64748b']
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } } }
    });
  }

  // Recent journal entries
  var recent = DATA.dailyLog.slice(0, 3);
  var html = '<div class="month-label" style="margin-top:8px">Recent Entries</div>';
  recent.forEach(function(r) {
    var d = parseDateDMY(r['Date']);
    var dayStr = d ? d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' }) : (r['Date'] || '');
    var acts = (r['Activities'] || '').split(';').filter(function(s){return s.trim();});
    var delays = (r['Delays'] || '').trim();
    var hse = (r['HSE Activities'] || '').trim();
    html += '<div class="day-entry">' +
      '<div class="day-header">' +
        '<div class="day-date-block"><div class="day-date-num">' + (d ? d.getDate() : '?') + '</div><div class="day-date-weekday">' + (d ? d.toLocaleDateString('en-GB', { weekday: 'short' }) : '') + '</div></div>' +
        '<div class="props">' +
          (acts.length ? '<div class="prop green"><span class="prop-label">Acts</span><span class="prop-value">' + acts.length + '</span></div>' : '') +
          (delays ? '<div class="prop red"><span class="prop-label">Delay</span><span class="prop-value">!</span></div>' : '') +
          (hse ? '<div class="prop"><span class="prop-label">HSE</span><span class="prop-value">✓</span></div>' : '') +
        '</div>' +
      '</div>' +
      (acts.length ? '<div class="section"><div class="section-label"><div class="dot" style="background:#38bdf8"></div>Activities</div><div class="section-content">' + acts.slice(0,3).map(function(a){return '<span class="activity-item">'+esc(a.trim())+'</span>';}).join('') + (acts.length > 3 ? '<span class="activity-item">+' + (acts.length-3) + ' more</span>' : '') + '</div></div>' : '') +
      (delays ? '<div class="section"><div class="section-label"><div class="dot" style="background:#f87171"></div>Delays</div><div class="section-content" style="color:var(--red)">' + esc(delays) + '</div></div>' : '') +
    '</div>';
  });
  document.getElementById('overviewRecent').innerHTML = html;
}

// ── Journal ─────────────────────────────────────────────────────
function renderJournal(monthKey) {
  if (monthKey === undefined) monthKey = 'all';
  document.getElementById('journalSubtitle').textContent = DATA.dailyLog.length + ' entries';

  var months = {};
  DATA.dailyLog.forEach(function(r) {
    var d = parseDateDMY(r['Date']);
    if (!d) return;
    var k = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    if (!months[k]) months[k] = d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
  });
  var monthKeys = Object.keys(months).sort().reverse();
  var firstMonth = monthKeys[0] || 'all';
  var current = monthKey === 'all' ? firstMonth : monthKey;

  var filterEl = document.getElementById('monthFilter');
  var monthHtml = '<span class="filter-label">Month:</span>';
  monthKeys.forEach(function(k) {
    monthHtml += '<div class="pill ' + (k === current ? 'active' : '') + '" onclick="setJournalMonth(\'' + k + '\', this)">' + months[k] + '</div>';
  });
  monthHtml += '<div class="pill ' + (monthKey === 'all' ? 'active' : '') + '" onclick="setJournalMonth(\'all\', this)">All time</div>';
  filterEl.innerHTML = monthHtml;

  var filtered = monthKey === 'all' ? DATA.dailyLog : DATA.dailyLog.filter(function(r) {
    var d = parseDateDMY(r['Date']);
    if (!d) return false;
    var k = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    return k === current;
  });

  var byMonth = {};
  filtered.forEach(function(r) {
    var d = parseDateDMY(r['Date']);
    if (!d) return;
    var mk = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    var ml = d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    if (!byMonth[mk]) byMonth[mk] = { label: ml, entries: [] };
    byMonth[mk].entries.push({ _d: d, r: r });
  });

  var container = document.getElementById('journalEntries');
  if (!Object.keys(byMonth).length) { container.innerHTML = '<div class="loading">No entries.</div>'; return; }

  var html = '';
  Object.entries(byMonth).sort(function(a, b) { return b[0].localeCompare(a[0]); }).forEach(function(entry) {
    var mk = entry[0];
    var monthData = entry[1];
    html += '<div class="month-group"><div class="month-label">' + monthData.label + ' <span class="month-count">' + monthData.entries.length + ' entries</span></div>';
    monthData.entries.forEach(function(item) {
      var r = item.r;
      var d = item._d;
      var acts = (r['Activities'] || '').split(';').filter(function(s){return s.trim();});
      var delays = (r['Delays'] || '').trim();
      var hse = (r['HSE Activities'] || '').trim();
      var notes = (r['Notes'] || '').trim();
      var section = (r['Section / System'] || '').trim();
      var dotColor = section.toLowerCase().includes('dematic') ? '#38bdf8' : section.toLowerCase().includes('tgw') ? '#facc15' : '#64748b';
      var sectionBadge = section ? '<span class="section-badge ' + (section.toLowerCase().includes('dematic') ? 'dematic' : 'tgw') + '">' + esc(section) + '</span>' : '';

      html += '<div class="day-entry">' +
        '<div class="day-header">' +
          '<div class="day-date-block"><div class="day-date-num">' + d.getDate() + '</div><div class="day-date-weekday">' + d.toLocaleDateString('en-GB', { weekday: 'short' }) + '</div></div>' +
          '<div class="props">' +
            (r['Company'] ? '<div class="prop"><span class="prop-label">Co</span><span class="prop-value">' + esc(r['Company']) + '</span></div>' : '') +
            (r['Completed Tasks %'] ? '<div class="prop ' + (r['Completed Tasks %'] >= 80 ? 'green' : '') + '"><span class="prop-label">%</span><span class="prop-value">' + r['Completed Tasks %'] + '</span></div>' : '') +
            (delays ? '<div class="prop red"><span class="prop-label">Delay</span><span class="prop-value">!</span></div>' : '') +
          '</div>' +
        '</div>' +
        (section ? '<div style="font-size:11px;color:var(--muted);margin-bottom:8px;padding-left:64px">' + sectionBadge + '</div>' : '') +
        (acts.length ? '<div class="section"><div class="section-label"><div class="dot" style="background:#38bdf8"></div>Activities</div><div class="section-content">' + acts.map(function(a){return '<span class="activity-item">'+esc(a.trim())+'</span>';}).join('') + '</div></div>' : '') +
        (delays ? '<div class="section"><div class="section-label"><div class="dot" style="background:#f87171"></div>Delays</div><div class="section-content" style="color:var(--red)">' + esc(delays) + '</div></div>' : '') +
        (hse ? '<div class="section"><div class="section-label"><div class="dot" style="background:#4ade80"></div>HSE</div><div class="section-content">' + esc(hse) + '</div></div>' : '') +
        (notes ? '<div class="section"><div class="section-label"><div class="dot" style="background:#facc15"></div>Notes</div><div class="section-content">' + esc(notes) + '</div></div>' : '') +
        (r['Internal Comments'] ? '<div class="section"><div class="section-label"><div class="dot" style="background:#94a3b8"></div>Internal</div><div class="section-content">' + esc(r['Internal Comments']) + '</div></div>' : '') +
        (r['Editor'] ? '<div class="entry-footer">Logged by ' + esc(r['Editor']) + '</div>' : '') +
      '</div>';
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

var currentJournalMonth = 'all';
function setJournalMonth(key, el) {
  document.querySelectorAll('.pill').forEach(function(p) { p.classList.remove('active'); });
  el.classList.add('active');
  currentJournalMonth = key;
  renderJournal(key);
}

// ── Headcount ────────────────────────────────────────────────────
function computeHCByDate(rows) {
  var map = {};
  rows.forEach(function(r) {
    var d = parseDateDMY(r['Date']);
    if (!d) return;
    var k = d.toISOString().slice(0, 10);
    if (!map[k]) map[k] = { total: 0 };
    map[k].total++;
  });
  return map;
}

function renderHeadcount() {
  var shifts = computeHCByDate(DATA.workDays);
  var dates = Object.keys(shifts).sort().reverse().slice(0, 30);
  var companies = {};
  DATA.workDays.forEach(function(r) {
    var co = r['Company'] || 'Unknown';
    if (!companies[co]) companies[co] = 0;
    companies[co]++;
  });

  // Company filter pills
  var coHtml = '<span class="filter-label">Company:</span>';
  coHtml += '<div class="company-pill ' + (FILTERS.company === 'all' ? 'active' : '') + '" onclick="setCompanyFilter(\'all\', this)">All</div>';
  Object.keys(companies).sort().forEach(function(co) {
    coHtml += '<div class="company-pill ' + (FILTERS.company === co ? 'active' : '') + '" onclick="setCompanyFilter(\'' + esc(co.replace(/'/g,"\\'")) + '\', this)">' + esc(co) + ' (' + companies[co] + ')</div>';
  });
  document.getElementById('companyFilter').innerHTML = coHtml;

  var filtered = FILTERS.company === 'all' ? DATA.workDays : DATA.workDays.filter(function(r) { return r['Company'] === FILTERS.company; });
  var shiftsF = {};
  filtered.forEach(function(r) {
    var d = parseDateDMY(r['Date']);
    if (!d) return;
    var k = d.toISOString().slice(0, 10);
    if (!shiftsF[k]) shiftsF[k] = { total: 0 };
    shiftsF[k].total++;
  });

  var html = '';
  dates.forEach(function(k) {
    var d = new Date(k);
    var sh = shiftsF[k] || { total: 0 };
    html += '<div class="hc-day">' +
      '<div class="hc-day-header">' +
        '<div class="hc-date">' + d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short' }) + '</div>' +
        '<div class="hc-total">' + sh.total + '</div>' +
      '</div>' +
    '</div>';
  });
  document.getElementById('headcountEntries').innerHTML = html || '<div class="loading">No data.</div>';
}

function setCompanyFilter(co, el) {
  document.querySelectorAll('.company-pill').forEach(function(p) { p.classList.remove('active'); });
  el.classList.add('active');
  FILTERS.company = co;
  renderHeadcount();
}

// ── Progress ─────────────────────────────────────────────────────
function renderProgress() {
  document.getElementById('progressSubtitle').textContent = DATA.siteProgress.length + ' items';
  var html = '';
  DATA.siteProgress.forEach(function(r) {
    var prog = r['Progress'] || 0;
    var barColor = prog >= 80 ? '#16A34A' : prog >= 40 ? '#CA8A04' : '#DC2626';
    var delay = r['Expected Delay'] || '';
    html += '<div class="progress-item">' +
      '<div class="progress-header">' +
        '<div class="progress-desc">' + esc(r['Description'] || '') + '</div>' +
        '<div class="progress-pct" style="color:' + barColor + '">' + prog + '%</div>' +
      '</div>' +
      '<div class="progress-bar-wrap"><div class="progress-bar" style="width:' + prog + '%;background:' + barColor + '"></div></div>' +
      '<div class="progress-meta">' +
        (r['Section'] ? '<span><strong>Section:</strong> ' + esc(r['Section']) + '</span>' : '') +
        (r['PLC-Area'] ? '<span><strong>Area:</strong> ' + esc(r['PLC-Area']) + '</span>' : '') +
        (r['Assigned To'] ? '<span><strong>→</strong> ' + esc(r['Assigned To']) + '</span>' : '') +
        (r['Planned Start'] ? '<span><strong>Start:</strong> ' + esc(r['Planned Start']) + '</span>' : '') +
        (r['Planned Finish'] ? '<span><strong>Finish:</strong> ' + esc(r['Planned Finish']) + '</span>' : '') +
        (delay && delay !== '0 days' ? '<span class="delay-badge">⚠ ' + esc(delay) + '</span>' : '') +
      '</div>' +
    '</div>';
  });
  document.getElementById('progressEntries').innerHTML = html || '<div class="loading">No progress data.</div>';
}

// ── Resources ─────────────────────────────────────────────────────
function renderResources() {
  document.getElementById('resourcesSubtitle').textContent = DATA.resourcePlan.length + ' weeks';
  var html = '<div class="week-row week-header"><div class="week-num">Week</div><div>Plan</div><div>Actual</div><div>Variance</div></div>';
  DATA.resourcePlan.forEach(function(r) {
    var plan = r.plan || 0;
    var actual = r.actual || 0;
    var diff = actual - plan;
    var diffPct = plan > 0 ? Math.round((diff / plan) * 100) : 0;
    var diffColor = diff >= 0 ? 'pos' : 'neg';
    var barMax = Math.max(plan, actual);
    html += '<div class="week-row">' +
      '<div class="week-num">W' + esc(String(r.week_num)) + ' ' + esc(r.year || '') + '</div>' +
      '<div><div class="bar-wrap"><div class="bar-plan" style="width:' + (barMax > 0 ? (plan/barMax*100) : 0) + '%"></div></div><div style="font-size:11px;color:var(--muted);margin-top:2px">' + plan + 'h</div></div>' +
      '<div><div class="bar-wrap"><div class="bar-actual" style="width:' + (barMax > 0 ? (actual/barMax*100) : 0) + '%"></div></div><div style="font-size:11px;color:var(--muted);margin-top:2px">' + actual + 'h</div></div>' +
      '<div><span class="pct-change ' + diffColor + '">' + (diff >= 0 ? '+' : '') + diffPct + '%</span></div>' +
    '</div>';
  });
  document.getElementById('resourceEntries').innerHTML = html || '<div class="loading">No resource plan data.</div>';
}

// ── Navigation ──────────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

function parseDateDMY(s) {
  if (!s || typeof s !== 'string') return null;
  var parts = s.trim().split('/');
  if (parts.length !== 3) return null;
  return new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
}

loadAll();
