<h2>Turso Fetch Diagnostic</h2>
<pre id="log">Starting...</pre>
<script>
var TURSO_DB = 'https://ema5-cleo.aws-eu-west-1.turso.io';
var TURSO_TOKEN = 'eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicnciLCJpYXQiOjE3NzY4NzQ5MDQsImlkIjoiMDE5ZGI1ZmYtMTgwMS03NjQ0LTg1MWYtNzYwYjIxYmEwY2M3IiwicmlkIjoiMzViNWFiZDctMDVhMy00MGQyLTkyMDgtMzQyODYxZGVkMTRhIn0.elg3ZXmgS4oEVhzIpS-W2PDqi18CEavcuxG335Lu2fxAdbvUPD178ArjrLW-kZo2HrOgawDUjlojA1XGyUCKCQ';

function log(msg) {
  var el = document.getElementById('log');
  el.textContent += '\n' + new Date().toISOString().slice(11,19) + ' ' + msg;
  console.log(msg);
}

async function test() {
  log('DB: ' + TURSO_DB);
  log('Token: ' + TURSO_TOKEN.slice(0,30) + '...');
  
  var payload = JSON.stringify({ stmt: { sql: 'SELECT COUNT(*) FROM daily_log', args: [] } });
  log('Payload: ' + payload);
  
  try {
    log('Starting fetch...');
    var r = await fetch(TURSO_DB + '/v1/execute', {
      method: 'POST',
      headers: { 
        'Authorization': 'Bearer ' + TURSO_TOKEN, 
        'Content-Type': 'application/json'
      },
      body: payload
    });
    log('Response status: ' + r.status);
    log('Response ok: ' + r.ok);
    var text = await r.text();
    log('Response body (first 200): ' + text.slice(0,200));
    var json = JSON.parse(text);
    var count = json.result.rows[0][0].value;
    log('daily_log count: ' + count);
  } catch(e) {
    log('ERROR: ' + e.name + ': ' + e.message);
  }
}

test();
</script>
</body>
</html>
